name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python files
        run: python -m compileall src scripts tests

      - name: Check CLI help
        run: |
          python -m tlse --help
          python -m tlse demo --help
          python -m tlse evaluate --help
          python -m tlse benchmark --help

      - name: Run tests
        run: pytest

      - name: Build demo dataset
        run: python scripts/make_demo_dataset.py

      - name: Train demo model
        run: python -m tlse.train --dataset demo/sample_data/landmarks_demo.pickle --model-output models/demo_model.p --report-output reports/demo_metrics.json --n-iter 2 --cv 2 --n-jobs 1 --split-strategy group

      - name: Evaluate demo command
        run: python scripts/evaluate_demo.py
